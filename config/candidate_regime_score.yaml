score_name: Three-factor candidate risk score

factors:
  - id: rolling_four_week_expansion
    label: Rolling four-week range at least 120% of prior ATR
    column: rolling4w_range_atr14_ratio
    operator: ge
    value: 1.20

  - id: below_40_week_sma
    label: NDX below 40-week SMA
    column: below_sma40
    operator: eq
    value: true

  - id: weekly_expansion
    label: Weekly range at least 120% of prior ATR
    column: weekly_range_atr14_ratio
    operator: ge
    value: 1.20

regimes:
  normal:
    minimum_score: 0
    maximum_score: 1

  elevated:
    minimum_score: 2
    maximum_score: 3

subperiods:
  - label: 2005-2012
    start_date: 2005-01-01
    end_date: 2012-12-31

  - label: 2013-2019
    start_date: 2013-01-01
    end_date: 2019-12-31

  - label: 2020-2026
    start_date: 2020-01-01
    end_date: 2026-12-31
